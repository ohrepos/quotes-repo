<p class="lead">일단 대립되는 것처럼 보이는 두 가지를 모두 믿자. 거기에서부터 나아가는 것이다. 한 발 한 발, 덤불을 쳐내고, 아는 것과 믿는 것을 분리하며, 모순되는 두 가설을 마음속에 나란히 놓아 두고서 각각을 대립되는 상대편의 시각에서 바라보는 것이다. 그리하여 마침내 진실이, 혹은 우리가 얻을 수 있는 한 진실에 가장 가까운 무언가가 선명하게 드러날 때까지. <틀리지 않는 법 (조던 엘렌버그, 2016)></p>
