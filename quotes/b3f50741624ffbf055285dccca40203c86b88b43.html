<p class="lead">그보다는 우리가 이 사고 도구를 사용하는 데 워낙 익숙해졌기 때문에 그 강력한 힘을 쉽게 잊는다고 말하는 편이 더 정확할 것이다. 알고 보면 이 단순한 귀류법은 2의 제곱근이 무리수임을 보여 주었던 피타고라스학파의 증명, 패러다임을 박살내는 어마어마한 충격이라서 그 발견자를 죽여야만 했던 그 증명을 가능케 한 장본인이었다. 그리고 그 증명은 더없이 단순하고 세련되고 간결하기 때문에, <틀리지 않는 법 (조던 엘렌버그, 2016)></p>
