<p class="lead">수학은 우리에게 원칙적인 방식에 따라 확신하지 않을 방법을 알려 준다. 〈거참〉 하고 포기하고 마는 것이 아니라, 〈나는 확신하지 않고, 확신하지 않는 이유는 이것이며, 확신하지 않는 정도는 대충 이 수준입니다〉라고 굳게 단정하도록 해준다. 혹은 더 나아갈 수도 있다. 〈나는 확신하지 않습니다. 그리고 당신도 확신하지 말아야 합니다〉라고. <틀리지 않는 법 (조던 엘렌버그, 2016)></p>
