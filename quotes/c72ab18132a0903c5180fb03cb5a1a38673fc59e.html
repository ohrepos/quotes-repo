<p class="lead">우리는 증거로부터 어떻게 진실을 끌어내야 할까? 네이만과 피어슨의 놀라운 대답은 그런 질문을 하지 말라는 것이었다. 두 사람에게 있어서 통계학의 목적은 무엇을 믿을지를 알려 주는 게 아니라 무엇을 할지를 알려 주는 것이었다. 통계는 질문에 답하는 학문이 아니라 결정을 내리는 학문이었다. 유의성 검정은 책임자에게 신약을 승인할지 말지, 경제 개혁안을 시행할지 말지, 웹사이트를 꾸밀지 말지에 대한 답을 알려 주는 규칙에 지나지 않았다. <틀리지 않는 법 (조던 엘렌버그, 2016)></p>
