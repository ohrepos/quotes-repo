<p class="lead">그러나 간결성에는 대가가 따른다. 영어가 기본으로 제공하는 오류 정정 기능이 사라지는 것이다. 로는 좁고, 붐비고, 사람들 사이에 공간이 별로 없는 엘리베이터이기 때문에, 로의 각 단어는 수많은 다른 단어들과 몹시 가까워서 혼란의 여지를 제공한다. 로에서 〈색깔〉을 뜻하는 단어는 bofab(보파브)다. 하지만 한 글자만 바꾸면 〈소리〉라는 뜻의 bogab(보가브)가 된다. bokab(보카브)는 〈전기〉를 뜻하고 bolab(볼라브)는 〈맛〉을 뜻한다. <틀리지 않는 법 (조던 엘렌버그, 2016)></p>
