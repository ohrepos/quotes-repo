<p class="lead">정의상, 부자인 것은 부유한 주 출신인 것과 대충 양의 상관관계를 갖는다. 그리고 부유한 주 출신인 것은 민주당을 찍는 것과 양의 상관관계가 있다. 그렇다면 부자인 것은 당연히 민주당을 찍는 것과 상관관계가 있어야 하지 않을까? 기하학적으로 말하자면, 벡터 1과 벡터 2가 예각을 이루고 벡터 2와 벡터 3도 예각을 이룬다면 벡터 1과 벡터 3도 예각을 이뤄야 하지 않을까? <틀리지 않는 법 (조던 엘렌버그, 2016)></p>
