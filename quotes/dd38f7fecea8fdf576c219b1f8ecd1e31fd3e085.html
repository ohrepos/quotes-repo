<p class="lead">첫 번째는 초등학교에서 분수를 배울 때다. 그전까지 아이들에게 수는 0, 1, 2, 3…… 같은 자연수였다. 〈몇 개인가요?〉 하는 질문에 대한 답으로서의 수였다. 많은 동물들도 이해한다고 알려져 있을 만큼 원시적인 이 개념으로부터 갑자기 훨씬 더 넓은 개념, 수가 〈무언가의 일부〉를 뜻할 수도 있다는 개념으로 도약하는 것은 철학적으로 극단적인 전환이다 <틀리지 않는 법 (조던 엘렌버그, 2016)></p>
