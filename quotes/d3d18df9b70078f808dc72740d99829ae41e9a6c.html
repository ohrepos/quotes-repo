<p class="lead">과학의 역사가 거듭 보여 주듯이, 수학적 우아함과 실용적 효용은 긴밀한 짝이다. 가끔은 과학자가 이론을 발견한 뒤 수학자에게 그것이 왜 우아한지 밝혀 달라고 넘기고, 또 가끔은 수학자가 우아한 이론을 개발한 뒤 과학자에게 그것이 어디에 쓰일 만한지 밝혀 달라고 넘긴다. 사영 평면이 쓰일 만한 작업 중 하나는 사실주의 회화다. 그리고 다른 하나는 복권 숫자 고르기다. <틀리지 않는 법 (조던 엘렌버그, 2016)></p>
