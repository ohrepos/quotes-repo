<p class="lead">유클리드와 피타고라스가 논했던 거리가 훗날 평면 기하학에 적용된 것처럼, 해밍은 평범한 거리를 새로운 정보의 수학에 적용한 셈이었다. 해밍의 정의는 간단했다. 두 블록 사이의 거리는 한 블록을 다른 블록으로 바꾸기 위해서 교체해야 하는 비트의 개수와 같다. 따라서 두 부호어 0010111과 0101011의 거리는 4다. 전자를 후자로 바꾸기 위해서는 2, 3, 4, 5번째 자리에 있는 비트들을 바꿔 줘야 하기 때문이다. <틀리지 않는 법 (조던 엘렌버그, 2016)></p>
