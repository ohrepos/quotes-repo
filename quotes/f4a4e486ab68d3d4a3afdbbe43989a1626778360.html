<p class="lead">두 번째 위험한 지점은 대수를 배울 때다. 대수는 왜 그렇게 어려울까? 대수 이전에는 우리가 곧바른 방향으로 진행되는 알고리즘 방식으로만 연산을 했기 때문이다. 알고리즘 방식에서 우리는 덧셈 상자나 나눗셈 상자에 어떤 수들을 집어넣은 뒤 손잡이를 돌린다. 그러고는 상자 반대편에서 나온 수를 답으로 보고한다. 대수는 다르다. 대수는 거꾸로 하는 연산이다. <틀리지 않는 법 (조던 엘렌버그, 2016)></p>
