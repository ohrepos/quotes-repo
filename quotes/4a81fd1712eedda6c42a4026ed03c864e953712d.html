<p class="lead">우리가 도무지 유클리드 공간처럼 보이지 않는 계에 관해서도 기하학적으로 생각할 수 있다는 발상, 심지어 그런 계를 〈기하학〉이라고 떳떳이 부를 수 있다는 대담한 발상은 알고 보니 우리가 살아가는 상대론적 시공간의 기하학을 이해하는 데 결정적이었다. 더 나아가 요즘 우리는 인터넷의 풍경들을 지도화하는 작업에도 일반화한 기하학적 발상들을 적용하는데, 이것은 유클리드가 이해할 만한 기하학으로부터 한참 더 멀어진 일이다. 이것이 바로 수학의 근사한 점이다. <틀리지 않는 법 (조던 엘렌버그, 2016)></p>
