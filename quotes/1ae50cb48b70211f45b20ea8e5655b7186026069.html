<p class="lead">이때 〈아무 영향도 안 미치는〉 시나리오를 귀무가설(歸無假說)이라고 부른다. 귀무가설은 곧 당신이 연구하는 개입 조치가 아무런 영향도 미치지 않는다는 가설이다. 신약을 개발하는 연구자는 종종 귀무가설 때문에 잠을 못 이룰 것이다. 귀무가설이 제대로 기각되지 않는 한, 자신이 의학적 돌파구를 쫓고 있는지 잘못된 대사 경로에 헛다리를 짚고 있는지 알 길이 없으니까. <틀리지 않는 법 (조던 엘렌버그, 2016)></p>
