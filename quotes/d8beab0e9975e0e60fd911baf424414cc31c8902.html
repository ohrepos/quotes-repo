<p class="lead">작은 학교들이 상위 25등을 휩쓴 것은 그들이 잘해서가 아니라 시험 점수에서 더 큰 변이를 드러내기 때문이다. 작은 학교에서는 천재가 몇 명 나타나거나 3학년 중 농땡이 치는 학생이 몇 명만 나타나도 학교 평균이 크게 흔들리는 데 비해, 큰 학교에서는 소수의 극단적인 점수들이 미치는 영향이 큰 평균에 녹아들기 때문에 전체 점수를 거의 움직이지 못한다. <틀리지 않는 법 (조던 엘렌버그, 2016)></p>
